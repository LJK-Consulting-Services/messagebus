name: CI

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      redis:
        image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install --require-hashes -r requirements-dev.txt

      - name: Syntax gate
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path

          ast.parse(Path("bus").read_text(), filename="bus")
          PY

      - name: Ruff
        run: python -m ruff check bus scripts tests

      - name: Pytest
        env:
          BUS_INTEGRATION_REDIS_URL: redis://127.0.0.1:6379/0
        run: |
          python -m pytest --cov=. --cov-report=term-missing --cov-report=json:coverage.json
          python scripts/check-bus-coverage.py coverage.json
